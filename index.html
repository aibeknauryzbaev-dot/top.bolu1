<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ұлттық дәстүрмен топқа бөлу</title>
    <style>
        /* Қазақ салт-дәстүрі (Ұлттық) тақырыбына арналған дизайн */
        :root {
            --bg-primary: #4a0e0e; /* Қою бордо (түскиіз түсі) */
            --bg-secondary: #2c0808;
            --surface-color: #fffdf8; /* Киіз үйдің іші (ақшаңқан) */
            --wood-color: #5c3a21; /* Ағаш түсі */
            --wood-light: #8b4513;
            --gold-color: #f1c40f; /* Алтын/сары */
            --accent-color: #d35400; /* Ою-өрнек қызыл-сары */
            --sky-blue: #3498db; /* Көк ту/Аспан түсі */
            --text-main: #2c1a0a;
            --border-radius: 20px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Сырмақ / Кереге стиліндегі фон */
        body {
            background-color: var(--bg-primary);
            background-image: 
                linear-gradient(45deg, rgba(0,0,0,0.3) 25%, transparent 25%, transparent 75%, rgba(0,0,0,0.3) 75%, rgba(0,0,0,0.3)),
                linear-gradient(45deg, rgba(0,0,0,0.3) 25%, transparent 25%, transparent 75%, rgba(0,0,0,0.3) 75%, rgba(0,0,0,0.3));
            background-size: 60px 60px;
            background-position: 0 0, 30px 30px;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Шашу эффектісі (тәттілер, бауырсақ, домбыра түседі) */
        .rain-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .drop {
            position: absolute;
            animation: fall linear infinite;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.5));
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0.8; }
        }

        /* Негізгі Контейнер (Ақ отау) */
        .container {
            width: 95%;
            max-width: 1100px;
            background-color: var(--surface-color);
            padding: 40px;
            border-radius: var(--border-radius);
            box-shadow: 0 20px 50px rgba(0,0,0,0.7), inset 0 0 30px rgba(211, 84, 0, 0.15);
            display: none; 
            flex-direction: column;
            align-items: center;
            text-align: center;
            border: 8px solid var(--accent-color);
            position: relative;
            z-index: 10;
            background-image: radial-gradient(var(--accent-color) 2px, transparent 2px);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            background-color: var(--surface-color);
            background-blend-mode: overlay;
        }

        .active-view {
            display: flex;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Типография */
        h1 {
            font-size: clamp(1.8rem, 4vw, 2.8rem); /* Экранға қарай бейімделетін кішірек өлшем */
            margin-bottom: 15px; /* Астыңғы бос орын сәл азайтылды */
            color: var(--wood-color);
            text-shadow: 2px 2px 0px var(--gold-color);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 900;
        }

        p.tip {
            color: var(--text-main);
            font-size: 1.3rem;
            margin-bottom: 30px;
            background: rgba(241, 196, 15, 0.4);
            padding: 10px 20px;
            border-radius: 15px;
            border-left: 5px solid var(--accent-color);
            font-weight: bold;
        }

        /* Форма элементтері */
        .form-group {
            width: 100%;
            max-width: 600px;
            margin-bottom: 25px;
            text-align: left;
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        label {
            display: block;
            font-size: 1.6rem;
            margin-bottom: 10px;
            color: var(--wood-color);
            font-weight: bold;
        }

        input[type="number"], textarea {
            width: 100%;
            padding: 15px 20px;
            font-size: 1.5rem;
            background-color: #fffdf8;
            border: 3px solid var(--wood-light);
            color: var(--text-main);
            border-radius: 10px;
            outline: none;
            transition: all 0.3s;
            font-weight: bold;
        }

        input[type="number"]:focus, textarea:focus {
            border-color: var(--sky-blue);
            box-shadow: 0 0 15px rgba(52, 152, 219, 0.4);
        }

        textarea {
            resize: vertical;
            min-height: 150px;
        }

        /* Асық пішінді батырмалар */
        button {
            padding: 15px 35px; /* Батырманың ішкі көлемі кішірейтілді */
            font-size: 1.8rem; /* Шрифт өлшемі 2.2-ден 1.8-ге түсірілді */
            font-weight: bold;
            color: #3e2723;
            /* Сүйек/Асық текстурасы */
            background: radial-gradient(circle at 30% 30%, #ffffff, #e6d5b8 80%);
            border: 2px solid #c7b299;
            /* Асыққа ұқсас бұрыс (органикалық) пішін */
            border-radius: 40% 50% 60% 40% / 50% 40% 60% 50%;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 
                6px 6px 15px rgba(0,0,0,0.4),
                inset -8px -8px 15px rgba(180, 150, 110, 0.7),
                inset 8px 8px 15px rgba(255, 255, 255, 0.9);
            margin: 15px;
            user-select: none;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        button:active {
            transform: scale(0.95) translateY(4px);
            box-shadow: 
                2px 2px 5px rgba(0,0,0,0.4),
                inset -4px -4px 10px rgba(180, 150, 110, 0.7),
                inset 4px 4px 10px rgba(255, 255, 255, 0.9);
        }

        /* Түрлі-түсті батырмалар (Көк және Қызыл асықтар) */
        .btn-secondary {
            background: radial-gradient(circle at 30% 30%, #a8e6cf, #3498db 80%);
            color: #fff;
            border-color: #2980b9;
            box-shadow: 6px 6px 15px rgba(0,0,0,0.4), inset -8px -8px 15px rgba(41, 128, 185, 0.8), inset 8px 8px 15px rgba(255, 255, 255, 0.6);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .btn-danger {
            background: radial-gradient(circle at 30% 30%, #ffbaba, #c0392b 80%);
            color: #fff;
            border-color: #a93226;
            box-shadow: 6px 6px 15px rgba(0,0,0,0.4), inset -8px -8px 15px rgba(169, 50, 38, 0.8), inset 8px 8px 15px rgba(255, 255, 255, 0.6);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        /* Қате хабарламасы */
        #error-msg {
            color: white;
            font-size: 1.5rem;
            margin-bottom: 20px;
            display: none;
            background: var(--danger-color);
            padding: 15px;
            border-radius: 15px;
            width: 100%;
            max-width: 600px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(192, 57, 43, 0.4);
            border: 3px solid var(--gold-color);
        }

        /* Ойын экраны */
        .stats-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .remaining-count {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--surface-color);
            background: var(--wood-color);
            padding: 10px 30px;
            border-radius: 15px;
            border: 4px solid var(--gold-color);
            box-shadow: 0 6px 0 var(--wood-light);
        }

        .group-counters {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: flex-end;
            flex: 1;
        }

        /* Санағыштар (Ою-тұмар пішіндес) */
        .counter-badge {
            font-size: 1.8rem;
            font-weight: bold;
            color: white;
            background-color: var(--sky-blue);
            padding: 10px 25px;
            border-radius: 10px 30px 10px 30px; /* Тұмар/ою формасы */
            box-shadow: 0 5px 0 #2980b9;
            transition: all 0.3s;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
            border: 2px solid #fff;
        }

        /* Орталық нәтиже аймағы (НАҒЫЗ ШАҢЫРАҚ ФОРМАСЫ) */
        .result-area {
            flex-grow: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50vh;
            height: 50vh;
            max-width: 80vw;
            max-height: 80vw;
            margin: 0 auto 30px auto;
            /* Аспан көк фоны */
            background: radial-gradient(circle, #87CEFA 0%, #3498db 100%);
            border-radius: 50%; /* Шаңырақ шеңбері (тоғын) */
            position: relative;
            /* Ағаш тоғынның визуалы */
            border: 18px solid var(--wood-color); 
            box-shadow: 
                0 0 0 6px var(--gold-color), /* Алтын жалатылған сырты */
                inset 0 0 25px rgba(0,0,0,0.6), /* Ішкі көлеңке (тереңдік) */
                0 20px 40px rgba(0,0,0,0.5); /* Жалпы көлеңке */
            overflow: hidden;
        }

        /* Шаңырақтың күлдіреуіштері (Крест ағаштар) */
        .kuldireush {
            position: absolute;
            width: 100%; 
            height: 8px;
            background: var(--wood-light);
            box-shadow: 0 3px 5px rgba(0,0,0,0.5); /* Аспан фонында көрінуі үшін көлеңке */
            z-index: 0;
            border-radius: 4px;
        }

        /* Бірінші бағыттағы күлдіреуіштер (3 дана) */
        .k-1 { transform: rotate(15deg) translateY(-25px); }
        .k-2 { transform: rotate(15deg) translateY(0); }
        .k-3 { transform: rotate(15deg) translateY(25px); }

        /* Екінші бағыттағы күлдіреуіштер (3 дана) */
        .k-4 { transform: rotate(-75deg) translateY(-25px); }
        .k-5 { transform: rotate(-75deg) translateY(0); }
        .k-6 { transform: rotate(-75deg) translateY(25px); }

        /* Экранға шығатын мәтін */
        #current-group-display {
            font-size: clamp(2rem, 6vw, 6vh); 
            font-weight: 900;
            color: #ffffff; /* Мәтін ақ түсті */
            text-transform: uppercase;
            letter-spacing: 3px;
            opacity: 0;
            transform: scale(0.1) rotate(-180deg);
            transition: all 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            text-align: center;
            padding: 20px;
            /* Аспан мен ағаш үстінен анық көрінуі үшін қалың көлеңке (Stroke) */
            text-shadow: 
                3px 3px 0px var(--accent-color),
                -2px -2px 0 var(--wood-color),  
                2px -2px 0 var(--wood-color),
                -2px 2px 0 var(--wood-color),
                2px 2px 0 var(--wood-color),
                5px 5px 15px rgba(0,0,0,0.8);
            z-index: 10; /* Күлдіреуіштердің үстінде тұруы керек */
            line-height: 1.2;
        }

        #current-group-display.show {
            opacity: 1;
            transform: scale(1) rotate(0deg);
        }

        .finished-msg {
            color: var(--gold-color) !important;
            font-size: clamp(1.8rem, 5vw, 5vh) !important;
        }

        .controls {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        @media (max-width: 768px) {
            h1 { font-size: 1.8rem; }
            button { font-size: 1.4rem; padding: 12px 25px; } /* Мобильді нұсқада одан да ықшам */
            .remaining-count { font-size: 1.6rem; }
            .counter-badge { font-size: 1.4rem; }
            #current-group-display { font-size: 10vw; }
            .result-area { width: 80vw; height: 80vw; max-width: none; max-height: none; }
            
            /* Мобильді нұсқада күлдіреуіштер арақашықтығын азайту */
            .k-1 { transform: rotate(15deg) translateY(-15px); }
            .k-3 { transform: rotate(15deg) translateY(15px); }
            .k-4 { transform: rotate(-75deg) translateY(-15px); }
            .k-6 { transform: rotate(-75deg) translateY(15px); }
        }
    </style>
</head>
<body>

    <!-- 1. Баптау экраны -->
    <div id="setup-view" class="container active-view">
        <h1>Ұлттық дәстүрмен топқа бөлу</h1>
        <p class="tip">Кеңес: Толық экран режиміне өту үшін <b>F11</b> пернесін басыңыз.</p>

        <div id="error-msg"></div>

        <div class="form-group">
            <label for="student-count">Оқушылар саны (Барлығы):</label>
            <input type="number" id="student-count" value="24" min="2" step="1">
        </div>

        <div class="form-group">
            <label for="group-names">Топ атаулары (әр жолға бір атау):</label>
            <textarea id="group-names">ДОМБЫРА
ҚЫРАН
ТҰМАР
АСЫҚ</textarea>
        </div>

        <button onclick="startGame()">Араластыру (Бастау)</button>
    </div>

    <!-- 2. Ойын экраны -->
    <div id="game-view" class="container">
        <div class="stats-header">
            <div class="remaining-count">Қалды: <span id="students-left">0</span></div>
            <div class="group-counters" id="group-counters-container">
                <!-- Осы жерге JS арқылы топ сауыттары (counters) қосылады -->
            </div>
        </div>

        <!-- Шаңырақ бейнесі -->
        <div class="result-area">
            <!-- Шаңырақ күлдіреуіштері -->
            <div class="kuldireush k-1"></div>
            <div class="kuldireush k-2"></div>
            <div class="kuldireush k-3"></div>
            <div class="kuldireush k-4"></div>
            <div class="kuldireush k-5"></div>
            <div class="kuldireush k-6"></div>
            
            <!-- Шығатын мәтін -->
            <div id="current-group-display">Бастау үшін батырманы басыңыз</div>
        </div>

        <div class="controls">
            <button id="next-btn" onclick="drawNext()" class="btn-secondary">Келесі оқушы</button>
            <button onclick="resetApp()" class="btn-danger">Қайта бастау</button>
        </div>
    </div>

    <script>
        // Ойынның негізгі айнымалылары
        let deck = []; 
        let groupLimits = {}; 
        let totalStudents = 0;
        let drawnCount = 0;

        const setupView = document.getElementById('setup-view');
        const gameView = document.getElementById('game-view');
        const errorMsg = document.getElementById('error-msg');
        const displayArea = document.getElementById('current-group-display');
        const nextBtn = document.getElementById('next-btn');

        function showError(message) {
            errorMsg.textContent = message;
            errorMsg.style.display = 'block';
            setTimeout(() => {
                errorMsg.style.display = 'none';
            }, 5000);
        }

        function startGame() {
            const countInput = parseInt(document.getElementById('student-count').value);
            const groupsRaw = document.getElementById('group-names').value.split('\n');
            
            const groups = groupsRaw.map(g => g.trim()).filter(g => g !== '');

            if (isNaN(countInput) || countInput < 2) {
                showError('Қате: Оқушылар саны кем дегенде 2 болуы тиіс!');
                return;
            }
            if (groups.length < 2) {
                showError('Қате: Кем дегенде 2 топ атауын енгізіңіз!');
                return;
            }
            if (countInput < groups.length) {
                showError('Қате: Оқушылар саны топтар санынан кем болмауы керек!');
                return;
            }

            totalStudents = countInput;
            drawnCount = 0;
            groupLimits = {};
            deck = [];

            const baseCount = Math.floor(totalStudents / groups.length);
            let remainder = totalStudents % groups.length;

            groups.forEach(group => {
                groupLimits[group] = baseCount;
            });
            for (let i = 0; i < remainder; i++) {
                groupLimits[groups[i]]++;
            }

            for (const [group, count] of Object.entries(groupLimits)) {
                for (let i = 0; i < count; i++) {
                    deck.push(group);
                }
            }

            // Fisher-Yates Shuffle
            for (let i = deck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [deck[i], deck[j]] = [deck[j], deck[i]]; 
            }

            updateCountersUI();
            
            setupView.classList.remove('active-view');
            gameView.classList.add('active-view');
            
            displayArea.className = '';
            displayArea.style.color = '#ffffff'; // Мәтінді ақ түсті қылу
            displayArea.innerHTML = 'ДАЙЫНСЫЗ<br>БА?';
            setTimeout(() => displayArea.classList.add('show'), 100);
            
            nextBtn.style.display = 'inline-block';
            nextBtn.textContent = 'Келесі оқушы';
        }

        function drawNext() {
            if (deck.length === 0) return;

            displayArea.classList.remove('show');
            displayArea.style.transform = 'scale(0.1) rotate(-180deg)'; 
            
            setTimeout(() => {
                const drawnGroup = deck.pop();
                drawnCount++;
                
                groupLimits[drawnGroup]--;
                
                displayArea.textContent = drawnGroup;
                displayArea.style.color = '#ffffff'; // Түсті әрқашан ақ қылып қалдырамыз (Шаңырақта анық көрінуі үшін)

                setTimeout(() => {
                    displayArea.classList.add('show');
                    displayArea.style.transform = `scale(1) rotate(0deg)`;
                }, 50);
                
                updateCountersUI();

                if (deck.length === 0) {
                    setTimeout(() => {
                        displayArea.classList.remove('show');
                        setTimeout(() => {
                            displayArea.innerHTML = 'ОЙЫН<br>АЯҚТАЛДЫ ✅';
                            displayArea.classList.add('finished-msg', 'show');
                            displayArea.style.transform = `scale(1) rotate(0deg)`;
                            nextBtn.style.display = 'none'; 
                        }, 300);
                    }, 1500); 
                }
            }, 300); 
        }

        function updateCountersUI() {
            document.getElementById('students-left').textContent = (totalStudents - drawnCount);
            
            const container = document.getElementById('group-counters-container');
            container.innerHTML = ''; 

            const natColors = ['#d35400', '#00bce4', '#8e44ad', '#27ae60', '#c0392b', '#f39c12'];
            let colorIndex = 0;

            for (const [group, count] of Object.entries(groupLimits)) {
                const badge = document.createElement('div');
                badge.className = 'counter-badge';
                
                const bgColor = natColors[colorIndex % natColors.length];
                badge.style.backgroundColor = bgColor;
                badge.style.boxShadow = `0 5px 0 rgba(0,0,0,0.3)`;
                colorIndex++;

                if (count === 0) {
                    badge.style.opacity = '0.5';
                    badge.style.filter = 'grayscale(100%)';
                }
                badge.textContent = `${group}: ${count}`;
                container.appendChild(badge);
            }
        }

        function resetApp() {
            gameView.classList.remove('active-view');
            setupView.classList.add('active-view');
            displayArea.className = ''; 
        }

        // Шашу эффектісі (Фондағы ұлттық элементтердің жаууы)
        function createShashu() {
            const shashuContainer = document.createElement('div');
            shashuContainer.className = 'rain-container';
            const items = ['🍬', '🪕', '🦴', '☀️', '⛺', '🥟', '🦅', '🪙', '🐎', '🇰🇿']; 
            for (let i = 0; i < 40; i++) { // Шамадан тыс көп болмауы үшін санын 40 етіп қойдым
                const drop = document.createElement('div');
                drop.className = 'drop';
                drop.textContent = items[Math.floor(Math.random() * items.length)];
                drop.style.left = Math.random() * 100 + 'vw';
                drop.style.fontSize = (Math.random() * 25 + 15) + 'px';
                drop.style.animationDuration = (Math.random() * 4 + 3) + 's';
                drop.style.animationDelay = (Math.random() * 3) + 's';
                shashuContainer.appendChild(drop);
            }
            document.body.prepend(shashuContainer); 
        }
        
        window.onload = createShashu;
    </script>
</body>
</html>
